spring.application.name=fisiofacil

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/fisiofacil}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when_authorized

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,https://fisio-facil-front-end.vercel.app}
app.reset-password.base-url=${APP_RESET_PASSWORD_BASE_URL:https://fisio-facil-front-end.vercel.app/reset-password}
app.jwt.secret=${APP_JWT_SECRET:change-this-secret-key-with-at-least-32-chars}
app.jwt.expiration-minutes=${APP_JWT_EXPIRATION_MINUTES:60}
